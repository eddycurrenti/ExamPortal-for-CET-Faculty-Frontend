<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">

<h2>Faculty</h2>

<button onclick="location.href='dashboard.html'">Dashboard</button>
<button onclick="location.href='createExam.html'">Create Exam</button>
<button onclick="location.href='questionPool.html'">Question Pool</button>
<button onclick="location.href='addStudents.html'">Students</button>
<button class = "lolo"  onclick="logout()">Logout</button>

</div>


<div class="main">

<h1>Manage Exam</h1>

<div class="card">

<h2 id="examTitle"></h2>

<button class="danger" onclick="deleteExam()">
Delete Exam
</button>

</div>

<div class="card">

<h3>Questions in Exam</h3>

<div class="filter">

<select id="subject">
<option value="Physics">Physics</option>
<option value="Physical Chemistry">Physical Chemistry</option>
<option value="Organic Chemistry">Organic Chemistry</option>
<option value="Inorganic Chemistry">Inorganic Chemistry</option>
<option value="Mathematics">Mathematics</option>
</select>

<button class="primary" onclick="loadQuestions()">
Load Questions
</button>

</div>

<div id="questionList"></div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/manageExam.js"></script>

</body>
</html>
